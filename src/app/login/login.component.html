<h2>登入頁面</h2>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

  <div>
    <label>帳號：</label>
    <input type="text" formControlName="username">
  </div>

  <div>
    <label>密碼：</label>
    <input class="boder" type="password" formControlName="password">
  </div>

  <button class="btn btn-primary" type="submit">登入</button>

</form>
